services:
  db:
    image: postgis/postgis:16-3.4
    container_name: toddy_finder_db
    environment:
      POSTGRES_DB: toddy_finder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
